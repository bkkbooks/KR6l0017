  - {type: variant, offset: 3582, length: 25, content: 梵音中三寶＝實【宮】寶【大】，實【宮】寶實名覆護，歸依趣向義應云歸趣。佛覆護，法僧亦如是＋（也）【三】【宮】是【大】，是也【宋】【元】【明】【宮】是是也, 宋: 為何所歸三寶各二種佛有二種身謂生身及法身法亦二種謂第一義涅槃法及一切無我法僧亦二種謂第一義僧及等僧為歸何等, 元: 為何所歸三寶各二種佛有二種身謂生身及法身法亦二種謂第一義涅槃法及一切無我法僧亦二種謂第一義僧及等僧為歸何等, 明: 為何所歸三寶各二種佛有二種身謂生身及法身法亦二種謂第一義涅槃法及一切無我法僧亦二種謂第一義僧及等僧為歸何等, 宮: 為何所歸三寶各二種佛有二種身謂生身及法身法亦二種謂第一義涅槃法及一切無我法僧亦二種謂第一義僧及等僧為歸何等}
