  - {type: variant, offset: 8549, length: 38, content: 上云無色依者，此依是津＝律【聖】津【大】，律【聖】津律膩義，謂欲色界是無色界氣分故名為＋（膩）【明】為【大】，為膩【明】為為膩依，此釋願智因依，果知＝如【明】知【大】，如【明】知如無色界〔也〕－【聖】也【大】，〔－〕【聖】也, 宮: '', 宋: 云無色依者此依是津膩義謂欲色界是無色界氣分故名為依此釋願智因依果知無色界也, 元: 云無色依者此依是津膩義謂欲色界是無色界氣分故名為依此釋願智因依果知無色界也, 明: 云無色依者此依是津膩義謂欲色界是無色界氣分故名為依此釋願智因依果知無色界也}
