body:
  text: 尊者法救造宋天竺三藏僧伽跋摩等譯智品第六已説建立賢聖人智今當説若智性能了明照一切有有無有涅槃彼諸相今説若者若其事智者決定義了者分別也明照者觀察也一切有者極三有際謂苦集諦有者有性也有無有者有盡也涅槃者諸煩惱滅此説滅諦彼諸中亦示道諦相者自性自然性今説者顯示自性也問何等為智答三智佛所説最上第一覺謂法智比智及世俗等智此三智攝一切智法智者若智境界欲界苦集滅道無漏智也此初受法相故説法智比智者若智境界色無色界苦集滅道無漏智也若此行法智轉即此行隨轉是比智以比類智故説比智等智者若智境界一切法有漏智也等者多受俗數謂男女長短等故説等智等者衆事聚會義也苦集及滅道二智從諦生是名與四智牟尼隨諦説此法智比智隨諦轉世尊隨彼諦聲説境界苦諦説苦智境界集滅道諦説道智若智觀他心是從三中説盡無生智二境界在四門若智觀他心是從三中説者三智觀他心以法智品為境界説法智以比智品為境界説比智以有漏心心法為境界説等智盡無生智二者盡智無生智是二智謂法智比智彼所作究竟決定轉是盡智不復當作決定轉是無生智問何諦境界答境界在四門謂彼緣四諦問若世尊説三智云何説十答對治及方便自性行行緣已作因長養是故説十智七因緣故説十智謂對治方便自性行行緣已作因長養彼對治者法智比智是無漏智欲界對治説法智色無色界對治説比智法智雖色無色界對治而非一切亦非全種是故不説方便者他心智亦智心法但彼方便欲知彼心故自性者等智多取俗數如前説行者苦智集智此二智行不壞緣壞一緣故此二智共一緣是故於彼緣無常行轉是苦智亦應説無常智以苦極增厭故名苦智復次不共故苦行一向有漏緣無常行者若有漏三諦緣若無漏有漏緣空無我行者若有漏一切法緣若無漏有漏緣是故苦智苦行應作四句或苦智非苦行者謂苦智行餘行或苦行非苦智者謂苦智相應法或苦智亦苦行者謂苦智行苦行或非苦智亦非苦行者謂苦智行餘行諸相應法如行已行當行亦如是如苦行無常空無我亦如是如苦智十二乃至道智亦如是行緣者謂滅智道智以彼智緣不壞行亦不壞已作者謂盡智所作已作故因長養者謂無生智因一切無漏智故住不動身故已説因緣建立十智善等分別今當説九智唯説善一智三分別一見二非見餘則有二種九智唯説善者除等智餘九智説善愛果故一知三分別者等智或善或不善無記一見者他心智是見分別性故二非見者盡智無生智非見非分別性故餘則有二種者餘七智或見或非見若法智比智苦集滅道智盡智無生智所不攝者是見攝者非見等智或見或非見五見世俗正見是見以捷疾故疑愛恚慢無明相應慧非見何以故二使覆故無明相應慧雖無二使一能極覆非餘煩惱何以故非觀察方便故不隱沒無記慧非見不捷疾故五識相應慧非見非思量性故學與無學六二智説無學非學無學一當知一三種學與無學六者謂法智比智苦集滅道智或學或無學若學人所得是學若無學人所得是無學二智説無學者盡智無生智是無學離煩惱住故非學非無學一者謂等智是非學非無學有漏故當知一三種者謂他心智或學或無學非學非無學若唯以學心心法為境界是學若以無學心心法為境界是無學若唯以有漏心心法為境界是非學非無學八智性不斷二知二種説有漏無漏一一則説有漏八智性不斷者除他心智及等智餘八智不斷離垢故二智二種説者他心智若有漏是修道斷若無漏是不斷等智若忍對治是見斷若智對治是修斷有漏無漏一者他心智或有漏或無漏以有漏心心法為境界是有漏以無漏心心法為境界是無漏一則説有漏者等智一向有漏煩惱住處故當知八智不斷説無漏四智有為緣有常緣則一五智二境界明智之所説四智有為緣者謂他心智苦集道智有為緣以陰為境界故有常緣則一者謂滅智無為緣以涅槃為境界故五智二境界者謂法智比智盡智無生智以三諦為境界是有為緣以滅諦為境界是無為緣等智亦以三諦為境界是有為緣以數滅及虛空為境界是無為緣法智應當知是從六地起比智則九地他心智在禪法智應當知是從六地起者法智六地可得自性得也謂四禪未來中間非無色無色不緣欲界故比智則九地者比智九地可得謂未來中間四禪三無色他心智在禪者謂根本禪有他心智是四支五支定果故等智應當知在於十一地謂彼諸餘智品品如前説等智應當知在於十一地者等智在十一地謂欲界未來中間四禪四無色謂彼諸餘智品品如前説者謂苦集滅道智盡智無生智若法智品在六地如法智若比智品在九地如比智若説諸念處一智當知後三則説一智餘四明智説若説諸念處一智當知後者謂滅智是法念處無為緣故三則説一智者謂他心智他心心法緣故是三念處除身念處餘四明智説者謂餘八智是四念處五陰緣故一智欲界依二界依有一二智三界依餘六一或三一智欲界依者法智唯欲界依以法智隨生或欲界四大造故二界依有一者他心智欲色界依依色故二智三界依者比智等智三界依餘六一或三者苦智等六智若法智品欲界依比智品三界依依者身之別名名則十六行事或説十六離於十六行除暗非無漏名則十六行者謂無常苦空非我因集有緣滅止妙出道正迹乘衆緣所持故無常逼迫故苦我所見對治故空我見對治故非我種子法故因等起故集相續故有相成熟故緣諸陰盡故滅三火息故止離內惱故妙離外惱故出趣向故道巧便故正等趣故迹至究竟故乘復次非究竟故無常重擔故苦內離人故空不自在故非我來方便故因出生方便故集增長故有與依故緣不相續離相續故滅離三有為相故止善故常故妙第一休息故離邪徑對治故道不正對治故正登涅槃城故足一切有對治故乘問事有幾行答事或説十六此名十六行有説事有七謂苦行名四事亦四顛倒對治故集行名四事一滅道亦如是如是説者名十六事亦十六者善問離十六行更有無漏慧耶答離於十六行餘暗非無漏離十六行無有無漏慧如契經説我生已盡此亦是苦等行生盡如言我斫木為誰斫謂斧斫此亦如是問此諸智各有幾行答二智十六行法智及比智如是行或非是説為等智二智十六行法智及比智者如所説十六行一切法智比智轉如是行或非是説為等智者等智行十六行亦非十六行十六行者謂暖等善根是十六行及餘不定聞思慧亦非者如病如癰等行是名為非問若等智是十六行者何故不説名苦智乃至道智答壞境界故無漏行不壞境界別諦緣故有漏行壞境界有漏無常行三諦緣空非我行一切法緣四智有四行決定行所説若智知他心如是行或非四智有四行決定行所説者苦智有四行乃至道智亦如是若智知他心如是行或非者若無漏他心智是道四行有漏智非自相境界故盡智無生智離空無我行説有十四行謂近於等故盡智無生智離空無我行説有十四行者盡智無生智十四行除空無我行問何故非空無我行耶答謂近於等故盡智無生智第一義而近等空無我行第一義近第一問彼諸行為誰能行亦為他所行耶為何等性答謂慧行能行亦為他所行餘有依二種無依他所行謂慧行能行亦為他所行者慧自性是行能於彼爾炎中行無常等行彼亦為無常等行所行餘有依二種者除慧餘相應等法是亦能行有緣故亦為他所行他所緣故非行非慧性故無依他所行者若彼不相應法謂色無為心不相應行是他所行非慧性故非能行無緣故已説建立行建立得今當説謂初無漏心或有成就一二或成就三四時各增一謂初無漏心或有成就一者謂初苦法忍相應心若未離欲成就一等智若離欲成就他心智二或成就三者第二苦法智相應心若未離欲成就三智苦智法智等智若離欲成就他心智四時各增一者於上四時一一增苦比智若未離欲四智法智比智苦智等智若離欲得他心智集法智增集智滅法智增滅智道法智增道智忍中不得智非智性故集滅道比智不增智以苦比智得名故已説成就智修今當説若得修於智謂在聖見道即彼當來修諸忍亦如是若得修於智謂在聖見道即彼當來修者見道諸智現在修即彼未來修謂苦法智現在修未來修苦法智非忍非餘智如是乃至道法智諸忍亦如是者苦法忍現在修即彼未來修非智非餘忍一切忍亦如是問何故見道唯修自分修道修自分及非自分耶答彼初得種性故見道初見諦故唯修自分非餘又不雜道故捷疾故不覺道故於彼三心中得修於等智當知最後心或修七或六於彼三心中得修於等智者見道三心無間等邊修等智謂苦集滅比智若依禪未來超升離生彼修一地見道二地等智謂禪未來及欲界若依初禪超升離生修二地見道三地等智乃至第四禪修六地見道七地等智問道比智邊何故不修等智耶答邊非分故諦無間等邊修故名無間等邊無能修一切道及佛邊際而知一切苦集滅復次世俗智於彼諦曾無間等故修見道眷屬故無間等邊等智是見道眷屬道比智是修道所以無色界不修以無見道故問法智何故不修答諦無間不究竟故若修者應説無間等中若欲界者則四陰性以不定故若色界者五陰性以定故有定則有定共色故有色陰是以有五陰智增故説修等智若苦無間等邊有四事欲界緣欲界苦色界緣色無色界苦集滅無間等邊亦如是是不生法依隨信行隨法行故彼隨信行隨法行成就而不現在前或修七或六當知最後心者若離欲得道比智未來修七智除等智盡智無生智若未離欲修六智除他心智修非想非非想處對治道等智非彼對治故不修於彼上修道十七無漏心當知修於七增益根或六於彼上修道十七無漏心當知修於七者若未離六種欲從須陀洹果進九無礙道八解脫道修七智此道禪未來攝故無他心智盡智無生智是無學故不修餘七智必修若世俗智離欲彼現在修一等智未來修七若無漏者四法智一一現在修未來七增益根或六者謂信解脫求見到彼無礙道修六智非他心智無礙道相違故非等智似見道故非盡智無生智無學故若未離欲解脫道亦修此六若離欲修七智是故説或升進得不動者九無礙道修七智非他心智無礙道相違故非等智非第一有對治故非無生智未得故八解脫道修八智亦得他心智故第九解脫道修十智是故説或得不還果時及離上七地勳修諸神通解脫修習八得阿那含果必得根本禪故修八智除盡智無生智及四禪三無色此七地離欲時九解脫道修八智若世俗道離欲時等智現在修未來八若無漏道離欲者是苦等六智一一現在修未來八六智者謂苦比智集滅道比智及滅道法智也勳修禪一解脫道學修八智無學修十智神足他心智宿命通一解脫道亦修八智根本禪攝故天眼天耳解脫道無記故不修上三通得時及後用時悉是解脫道解脫道悉是善神足降伏衆生故餘二所見微遠故眼耳無此故無記此諸無礙道及滅第一有即彼八解脫當知修於七七地離欲無礙道及熏修禪二無礙道學諸通五無礙道七地離欲及熏修以一等智一無漏智為無礙道二念故言二五通各有一無礙故言五修七智除他心智無礙道相違故第一有離欲八解脫道修七智除等智非對治故第一有離欲無礙道修六上乘應當知修習於下地第一有離欲無礙道修六者第一有離欲九無礙道修六智除他心智及等智一切方便道有漏無漏修八智上乘應當知修習於下地者若此地離欲即修此地無漏智及下地謂初禪離欲即修初禪功德及未來如是乃至第一有離欲修一切地無漏功德上對治名為上乘無學初心中修於一切地無學相似修或苦習比智無學初心中修於一切地者無學初盡智相應心修九地功德問修何等種無學功德答謂無學相似修若退法者修九地軟軟功德乃至如來地修上上功德問無學初心何智答或苦集比智或苦比智或集比智生緣故作如是念我生已盡此非想非非想處四陰生緣最後盡故已説修無漏功德有漏今當説盡智心俱修善有漏功德九地至一地次第修亦減得阿羅漢果時或修九地善有漏功德乃至成一地問何故九地乃至一地也答謂生於欲界修九地有漏若生第一有則修於一地若生欲界得阿羅漢果得盡智所修九地善根若生初禪修八地除欲界如是乃至非想非非想處即修彼地善根問何故於此處修三界善根答一切縛解永蘇息故如三等縛解如降伏煩惱力士衆咸稱善如王登祚解脫灌頂一切皆獻珍奇寶物先雖得下地功德以上地煩惱故智光不明得阿羅漢果一切功德增修照明修義擇品當廣説問世尊説見智慧為一為異耶答諸忍則非智盡無生非見餘一切聖慧當知三種性諸忍則非智者八無間等忍非智不決定故自品對治疑得縛故決定義是智義故復次忍者希望求智者希望息復次忍是見非智性智性盡無生非見者盡智無生智非見息求故中平故背生死故餘一切聖慧當知三種性者除忍及盡智無生智餘慧種能求故見決定故智問何者是答學八智及無學等見若善有漏智在意則是見煩惱見是智此及餘説慧善有漏意地智能求故見有説非一切意識相應善有漏智是見性謂從不思量識身所起故非見五識次生意識此非見也命終心非見羸劣故起作心非見外向故如是好謂初説凡説得理者名如是説煩惱見是智者若見自性謂身見等從思量生故説見亦説智決定故此及餘説慧者此説若智若見及餘未説者謂意識相應無記除五見諸餘意地染污及一切五識相應當知一切是慧謂彼説未説者若無記慧非見不捷疾故工巧慧雖捷疾而非見求生所障故染污前已説五識相應慧非見不分別故不捷疾故一往故問一一智幾智緣答法智及比智觀察於九智因智及果智境界於二智法智及比智觀察於九智者法智緣九智除比智比智亦緣九智除法智問何故不展轉相緣答下上境界故法智緣下比智緣上是故不展轉相緣如二人同止一人觀下一人觀上地空異觀故不相見面若言不自緣如不自見面者不然續觀故因智及果智境界於二智者苦集智緣有漏他心智及等智苦集諦所攝故道智緣九智解脫智無緣餘一切境界決定智所説道智緣九智者道智緣九智除等智餘九智緣道諦所攝故解脫智無緣者滅智不緣智緣無為故餘一切境界決定智所説者餘四智他心智等智盡智無生智緣十智問如前説若欲界對治是法智雖色無色界對治非一切亦非全何等法智為色無色界對治答謂彼滅及道法智之所行是三界對治非欲界比智謂彼滅及道法智之所行是三界對治者有修道滅法智道法智是三界修道所斷對治彼於欲界極見過患思惟欲界行滅及對治得離三界欲問何故非苦集法智答下劣上勝故非觀劣能離勝處欲滅道俱勝是故觀此滅三界欲復次若緣欲界離色無色界者是為異厭異不樂異解脫此則不然問頗比智離欲界也答非欲界比智無比智欲界對治自事未究竟故如王降伏自界怨已然後伏他法智亦如是無有比智先滅色無色界後滅欲界也又法智是極利智尚滅不善況無記也問神通幾智性答神足天眼耳是説一等智或六智宿命五説他心智神足天眼耳是説一等智者神足天眼天耳一等智無漏智不以此行神足者種種示現天耳通是天耳識相應慧生死通是天眼識相應慧神足餘品當説天耳方便思惟大聲彼方便漸增得色界四大所造清淨天耳隨聲遠近一切悉聞天眼方便思惟明相彼方便漸增於眼周圓得色界四大所造清淨天眼處於一方遍覩十方一切悉見而非一時或六智宿命者尊者瞿沙説六智非他心智緣現在故非滅智緣無為故非盡智無生智非見性故阿毗曇者説一等智緣衆生名姓等故方便者或於自身或於他身於是處方便即於是處究竟或復餘也聲聞緣覺從前身起乃至究竟隨其所欲唯有如來隨意自在若前若後隨所聞見皆悉憶念五説他心智者五智知他心謂法智知他法智品心心法自分境界故比智亦如是道智知他無漏心心法等智知他世俗心心法他心智五也方便者或從自身或從自心取其相貌如是相身有如是相心以是方便善根漸增乃至知他心心法是名成就於色方便及自心起至成就時不緣色及自心離於行緣知他心智根地人度不知根度者軟不知中上根謂乃至第四禪地軟知下地軟無漏非餘有漏者知有漏不知無漏地度者初禪不知二禪人度者學人不知無學人是故佛心心法非一切他心智境界一切他心智事境界自相境界心心法境界現在境界他境界除見道是修道得故空無相不相應盡智無生智不攝離無礙道問神通云何如説而生為異也答或有説如説而生如世尊先説神足是故前生乃至後説生死智是故後生尊者瞿沙説謂欲界處起神通如説而生若色界則異此修行者聞説色界天而不見欲見故起天眼見而不能往故起神足往而不聞説故起天耳雖聞而不知心云何往故起他心智知他心而不自知先所從來故起宿命智如是説者神通無有次第正受亦無超越正受亦無順正受亦無逆正受當知神通解脫道所攝非無礙道問力無所畏一一幾智性答處非處智力及第一無畏此是佛十智餘此中差別處非處智力及第一無畏此是佛十智者處非處力及初無畏此十智性普境界故問餘力無畏何智性也答餘此中差別處非處力差別有餘力初無畏差別有餘無畏世尊觀受化者希望故建立多種問何故世尊自説功德也答為求佛道者修念佛三昧故復次於等解脫現差別故樂説辨才故無盡無滯無缺乃至降伏醉象等中有疑者不知誰力為彼故顯示自力故復次為受化者説實功德不過量故離非大人法故淨業有愛果不淨果不愛此説為是處異則説非處應當如是知是處非處力淨業有愛果不淨不愛果此説為是處者因果決定彼無障礙智知此是彼決定因謂淨業有愛果不淨業不愛果猶如外種因果隨類異則説非處者與是相違名非處應當如是知是處非處力者等起容受義是處義也與是相違名非處義也不伏不屈故無勝無動故説力彼十智自性在於十一地決定説如來謂閻浮提依彼十智自性者如前説普境界故十智自性緣一切法是十六行或離行四念處三正受三根相應在於十一地者謂欲界四禪未來中間四無色決定説如來者説建立如來力非聲聞緣覺以如來除二種無知故謂染污不染污是故佛智不為非智所屈是無學及非學非無學非是學聲聞緣覺雖除染污不除不染污如來除二種疑使處疑處非處疑謂閻浮提依者謂閻浮提身現在前非餘餘方無佛出世故閻浮提人利根易覺是故佛閻浮提出世非餘第二力八智於彼事業轉及法受煩惱餘則如前説第二力八智者自業智力八智除滅智道智無漏緣故是故説八行或離行空無願相應問何緣答於彼事業轉及法受煩惱彼事者是業果身口業及思是業法受者有四法受有法受現世樂後世樂如是比煩惱者是業因於此轉緣此起餘則如前説者餘如處非處力説諸禪及背捨正受三摩提第三力回轉九智餘如前諸禪及背捨正受三摩提第三力回轉者禪者四禪背捨者八背捨正受者無想定滅盡定及四無色三摩提者空無相無願第三力者於此禪背捨正受三摩提中轉緣此起問此力何性答九智性除滅智及滅四行無相三昧無為緣故餘如前者餘如自業智力説於上下諸根第四力回轉第五説解力第六於界緣於上下諸根者上者勝下者劣根者主第四力者上下諸根力也回轉者緣也謂緣三諦從緣根方便起故説上下諸根力如他心智第五説解力者解者欲也彼亦二種有勝有劣勝者善欲劣者惡欲復次欲道及道果者勝欲生死者劣此亦緣三諦從欲方便起故説欲力第六於界緣者界者自性也有二種如前説於彼種種趣第七力回轉當知已説四餘皆如前説於彼種種趣第七力回轉者趣者道也彼亦種種向地獄乃至涅槃彼緣趣及衆具故名趣力當知已説四餘皆如前説者已説根解界趣力餘因緣當知如禪背捨正受三昧説或有説趣智力是十智性知宿命有行是説第八力謂禪有煩惱餘則如前説知宿命有行是説第八力者宿命力於宿命所受若所行所受種種悉知彼所行者謂中陰所受者謂本有以本有有所受若剎利若婆羅門如是比悉知是宿命力説一智謂宿命智有二種謂曾得今得上中下説三地建立説四軟中上曾得今得説六地曾得今得説八下下至上上説九地及下中上分別説十二下下等曾得今得説十八地下中上曾得今得説二十四地下下等分別説三十六地下下等曾得今得説七十二此總説一宿命智謂禪者根本禪非眷屬非無色無神通所依三摩提故四支五支所攝三摩提神通所依唯禪非餘若依彼禪得宿命通即知彼禪及下地若依初禪得神通知初禪及中間同一地故有煩惱者前已説是等智是故無無漏事是法念處餘則如前説者如趣智力説第九力當知遠離於所緣命終及受生行於衆生數第九力當知遠離於所緣者生死智力除緣餘如宿命智説聲聞不方便見千世界方便者見二千世界緣覺不方便見二千世界方便見三千世界佛不方便見三千世界方便見無量無邊億百千三千世界問何緣答命終及受生行於衆生數彼緣色入如所説隨業受法如實智當知彼説眷屬生死智此則內法第十力十智或六一切地示現力明通餘皆如前説第十力十智或六者若説漏盡人所得為漏盡智者彼説十智性若以漏盡緣故為漏盡智者彼説六智除他心智苦集道智一切地者漏盡智在十一地攝受生故示現力明通者彼漏盡智説名示現謂教誡示現令彼歡喜不傾動故説力永離無明故説明通種性故説通宿命智力生死智力是説通明力非示現問此非非學非無學耶何故契經説三明一向無學答無學身中得故導第一義明故問六通何故三通建立明非餘耶答三種愚對治故彼初明滅前際愚第二滅後際愚第三滅真諦愚導三解脫門故六通中二通是示現非明謂神足他心智二是明非示現謂宿命智及生死智漏盡通俱有天耳通俱無餘皆如前説者餘所未説者因緣如前説已説力無畏今當説初則如初力第二如第十餘二如二七是名無畏安初則如初力者言我等正覺此初無畏即處非處力第二如第十者言我諸漏已盡此即漏盡力餘二如二七是名無畏安者言我為諸弟子説障道法彼言不障道者無此畏也此即自業智力言我為諸弟子説道是賢聖出離言不出離者無此畏也當知此即趣力問世尊何故説此契經答制善星及婆羅婆誹謗故説此契經善星言沙門瞿曇無過人法為制彼故説前二無畏婆羅婆言沙門釋種子法我悉知見為制彼故説後二無畏復次前二無畏是説自安後二無畏是説安他不屈伏義是無畏義離恐怖故問力無畏何差別答有説無差別又説智是力智光普照是無畏安住是力勇猛是無畏智無盡是力辨無盡是無畏如是等復次一一力攝四無畏一一無畏攝十力此十四法又三不共念處及大悲是佛十八不共法不共一切聲聞緣覺故不共念處及大悲是慧性問無諍何地云何行何處現在前何緣何等人起何等自性也答第四禪有垢無諍三方依緣欲未生惱依不動智慧第四禪者無諍在第四禪非餘普境界故於一切依最勝故是有垢離聖行故無諍者煩惱相違故三方依者三方現在前非餘説力所起故緣欲未生惱者緣欲界未來煩惱謂貪恚癡慢自相煩惱非總相總相是普境界是故得四念處捨根相應依不動者依離煩惱身得故三昧力故唯不動法者所能起非餘智慧者是智慧自性也彼阿羅漢不行五因緣故則能令彼不起煩惱謂正威儀及正説分別應受不應受觀察住處及觀察人正威儀者於一方正身坐若有人來即觀其心觀察彼心何等威儀令不起結若此威儀令彼不起即時便住如是威儀正説者若有人來即觀其心若説而起彼結則不為説不説而起則便為説分別應受不應受者他施衆具即觀察之若受其施而起彼結雖須不受不受而起雖不須而受觀察住處者若住此處而起彼結雖衆具豐足則便捨去觀察人者先觀察人然後入里若舍若巷有起結者則便不入云何於彼復作惡緣為攝他故作是思惟我於往昔煩惱身時彼等於我起煩惱故受不愛果況今離欲當作方便令彼於我必不起惱佛及波羅蜜諸聲聞等得無諍滿而不數入為令衆生因惱得度故有時不入無諍三昧也所謂妙願智遠離彼境界於彼最後得六智自在性所謂妙願智遠離境界者妙願智亦在第四禪是有漏依三方不動者所得是智惠性緣一切法普境界故無色依者上云無色依者此依是津膩義謂欲色界是無色界氣分故名為依此釋願智因依果知無色界也觀行差別如田夫是故説四念處如願而知故説願智欲知而知是其義於彼最後得者若起彼智時謂欲界善心次第初禪現在前如是次第乃至非想非非想處如是逆次第乃至欲界善心復順次第乃至第四禪現在前彼復於第四禪從軟至中從中至增於彼增上第四禪後起願智六智自在性者此智六種自性謂三無礙智除辭無礙又無諍智後邊智及妙願智此智三因緣故起攝他故攝教法故覺世間安不安故義辨漏無漏在於一切地佛説為方便餘則如前説義辨漏無漏者此辨十智性以一切法第一義故有説六智性除他心智苦集道智以滅諦最第一義故是故説行念處三昧緣在於一切地者此辨在十一地自性得故佛説為方便者義辨以佛所説為方便若先無佛説則無能起者不知義故餘則如前説者餘所未説者如願智説所謂為應辨境界道及説因明論方便或三餘如前所謂為應辨境界道及説者應辨緣道及言説是故九智自性除滅智有十二行因明論方便者此辨不以因明論為方便則無能起者不知應不應故是故説阿毗曇為方便以因明論無如阿毗曇者以智具足故或三者此辨三智性謂辨及願智最後智有説知一切法第一義彼亦義辨餘如前者餘所未説者如義辨説法辨緣施設在於五地中以數為方便餘如無諍説法辨緣施設者法辨緣名分齊在於五地中者謂欲界及四禪非上地以無色界不緣名及下地非分故以數為方便者法辨以數論為方便餘如無諍説者餘所未説者如前無諍説聲明論方便是則為辭辨境界於言説二地餘如前聲明論方便是則為辭辨者辭辨以聲明論為方便若先不習聲明論則不能起離種子故境界於言説者此辨緣言説是故是身念處二地者欲界及初禪非上地離覺觀故餘如前説者如法辨説問辨云何如説生耶為異耶答有説如説生謂先於法起名巧便知名未知義故次第起義辨雖知義不知辭故次起辭辨知辭辨已不能連注説故次起應辨又説先起義辨知義不知名故次起法辨知名不知辭故次起辭辨知辭不能連注説故次起應辨應辨如前説又説名隨説轉是故先起辭辨後起法辨義依名轉是故次起義辨此三辨導應辨問此辨云何為一一得也答不然若得一則具四如四聖種一時得此亦如是
