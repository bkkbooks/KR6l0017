body:
  text: 尊者法救造宋天竺三藏僧伽跋摩等譯賢聖品第五已説諸煩惱修行今當説初則名始業次則已習行思惟已度者當知第三種三種修行謂始業已習行思惟已度始業者不淨轉未曾得境界意解思惟分已習行者受自相念處轉未曾得決定分善根此上當知思惟已度以此上一乘道故復次不淨觀亦三種修行謂從足指起乃至頂除去皮血肉意解思惟是名始業於此骨瑣不作想生周遍大地又觀骨瑣不作想彼骨瑣展轉相對大風飄摶消為雪聚是名已習行略觀骨瑣還至自身於其所緣清淨寂靜唯觀一色是名思惟已度如是乃至略境界當知善根漸增當知一切餘方便善根亦如是已説修行餘今當説若此煩惱怖遠離諸賢聖如實正具足方便應善聽若者若種若方便若分別此者次第説示煩惱煩惱者熱惱故亦離一切有漏但煩惱過如毒飯是故説離煩惱衆恐怖本者起種種業種種生遠離者數滅滅賢聖者正定聚謂七人及真實凡夫如實正具足者謂住真實道方便應善聽者彼方便道當一心聽方便者一切善法方便向解脫行施等起非唯道三苦所逼迫世間不能覺欲令修定故始於自身分繫縛心令定欲縛於識足為盡智慧怨始者先也自身分者自身中一處也若眉間鼻端及足指繫縛者安立緣中令不散何所安立謂自心定力故起智慧問何故答欲縛於識足心流轉不住故縛一緣中一心故知真實不亂問何故縛一緣中答為盡智慧怨智慧怨者謂諸煩惱彼應斷雖觀他身如觀死尸契經説以彼遠因故此説近因觀又隨順一切度門故謂觀白骨身分隨順三度門觀死尸唯隨順一不淨度門三度門者謂不淨觀安般念界方便觀彼貪欲者以不淨觀度覺觀者以安般念度見行者以界方便觀度如師所授隨樂修行不淨觀安般念契經品廣説界方便觀今當説此以愚夫不正思惟障蔽慧眼不觀真實緣起之法宿業煩惱種無量法積聚五陰起積聚想以愚惑故於緣起所作中計我作等諸邪見縛或時修行近善知識得聞正法起正思惟已能於自身界方便觀此身種種自性種種業種種相謂地等六界彼地界為水界潤故不相離水界為地界持故不流散火界成熟故不淤壞風界動搖故得增長空界空故食等入出識界合故有所造作又觀此身從足至頂種種不淨穢惡充滿觀察此色猶如猛風飄散積沙於無色法先後相續異分觀察如是觀者得空解脫門種子於彼生死厭離不樂得無願解脫門種子於生死不樂已正向涅槃得無相解脫門種子若於此得不作想覺已觀一切有為皆悉散壞是名界方便滿問如是觀已復云何答是方便於身真實相決定諸受及自心法亦如是觀彼修行者不淨觀安般念界方便觀一一住已身受心法各觀真實真實者不顛倒相者二種謂自相及共相色相是身自相四種及所造隨覺相是受自相識相是心自相法念處有種種法種種各異相隨知是想相為作是思相如是比共相後當説問此念處如大地建立應説一有漏無漏分別應説二軟中上分別應説三即此有漏無漏分別應説六身等有漏無漏分別應説八九品分別應説九身等若內若外若內外分別應説十二九品有漏無漏分別應説十八身等軟中上有漏無漏分別應説二十四身等若內若外若內外若厭離若不樂若觀察分別應説三十六身等九品有漏無漏分別應説七十二若念念分別應説無量何故説四念處耶答四倒四念四識住及陰以四種修所治故説四種隨修法彼治不淨淨想顛倒故説身念處治苦樂想顛倒故説受念處治無常常想顛倒故説心念處治無我我想顛倒故説法念處如是餘種隨所應説問此念處云何滿答以二因緣滿謂壞境界及善根增壞境界者以極微剎那壞境界隨其義善根增者謂依軟善根中依中增是名為滿問何故前説身念處後乃至法念處耶答起隨順故世尊説三種隨順起隨順説隨順無間等隨順起隨順者謂念處及禪無色修行者前起身念處乃至後起法念處是故世尊前説身念處乃至法念處當知禪無色亦如是説隨順者正斷如意足根力覺道枝乘一剎那起精進具四正斷説易故已生惡不善法方便令斷乃至已生善法方便令住如是廣説如是正斷以所作故説四正斷非自性故無間等隨順者説真諦修行者先入苦無間等故是故前説廣説如是問何故修行者先起身念處乃至法念處耶答麁故五陰何者麁謂四種及所造是故先觀受雖非色以行麁故次説謂手足等痛受則隨轉雖想行陰麁非識而與涅槃合施設法念處故彼最細是故先觀心後觀法雖一切悉是法此於法想滿故建立是故説一法念處非餘如界品中説法入此中亦爾想滿者於聲是想於義是名滿問幾種念處答三種説念處自性及與共亦説名為緣聞等慧亦然三種説念處自性及與共亦説名為緣者三種念處謂自性念處共念處緣念處自性念處者説不顛倒惠何以故如説順身觀身觀者是惠念者所作事不忘授緣故除自性過故説念處共念處者與正慧一果法如世尊説比丘善法積聚謂四念處是為正説緣念處者一切法如所説比丘一切法説四念處是為正説也攝受具故及略緣故共念處斷煩惱非餘自性念處雖有略境界彼具不足故攝受具道斷煩惱緣念處雖攝衆具然境界普散故略境界道斷煩惱問唯此念處三種餘亦然耶答聞等慧亦然餘亦三種謂聞思修聞者常於名處起從師受契經律阿毗曇思者或思處起或離思修者一向離名起如三人學浮一始學二半學三善學始學者近岸半學者或近或離善學者離岸初人者譬聞慧第二者譬思慧第三者譬修慧修慧能斷煩惱永離名故及正定故謂二種無義者不然何故趣修慧故修慧者具四念處身受心法彼法念處斷煩惱非餘總境界故非餘事境界故起法念處故亦非無義法念處二種壞緣不壞緣若慧緣色是身念處若緣受是受念處若緣心是心念處若緣想行及無為是不壞緣法念處餘今當説入法中總觀得法真實相此四是無常空無我非樂入法中總觀得法真實相者修行者入不壞緣法念處修一一念處遍觀一切法自相共相已入壞緣法念處色受緣念處色想緣色行緣色識緣如是三四五陰緣是法念處成一切身受心法念處一覺總觀度此云何此四是無常空無我非樂以無常等行總觀一切有漏法彼念念滅故無常離常等故空不自在故無我實逼迫故苦從是名為暖於法覺而生十六行等起觀察四聖諦從是名為暖於法覺而生者彼修行者於壞緣法念處次第生善根名為暖問幾行何境界答十六行等起觀察四聖諦彼暖法行苦諦等十六行彼苦聖諦四行乃至道聖諦四行行義智品當廣説彼暖法生緣三諦法念處現在修未來四一行現在修未來四自分非不自分緣滅諦法念處現在修即此未來修非初離陰觀得修緣陰道一行現在修未來四緣三諦增進四念處一一念處現在修未來四一行現在修未來十六緣滅諦增進法念處現在修未來四一行現在修未來十六修未增善根修自分行曾善根現在修修自分不自分行暖法是慧自性隨轉法則五陰性暖者生聖智火故暖為種故説暖法是法增長已生頂及於忍得世第一法依於一剎那是法增長已生頂及於忍者修行者正方便正憶念增長得隨順善業衆具故暖法得增長次生善根名為頂緣四聖諦行十六行彼頂法緣四諦緣滅諦增進法念處現在修未來四一行現在修未來十六緣三諦增進四念處一一現在修未來四一行現在修未來十六此善根亦慧性隨轉法五陰性頂法者在暖上故曰頂劣於忍名為下或時世尊説信如為波羅延説或説慧如為諸年少比丘説受事於此頂退名頂退名頂墮暖亦應有墮但不説頂墮者以多憂惱故有三處起大憂惱如失大寶謂非想非非想離欲退離欲界欲及頂法退者名不成就性彼修行者於此正方便成就頂善根增進生諦順忍緣四諦行十六行初忍及增進法念處現在修未來四一行現在修未來十六忍者於四聖諦堪忍欲樂暖頂亦堪忍者不然忍不退故違惡趣故近聖道故是故説諦順忍非暖頂問忍增長生何善根答得世第一法依於一剎那謂增上忍次第緣生凡夫所得最勝善根名世間第一法此亦五陰性彼有漏故名世間勝暖等故説第一此亦凡夫所修最上功德一剎那不住故似見道故暖頂忍相續故有説彼慧修一切總觀法念處次第生決定分世間行善根彼建立九品彼軟軟軟中軟上名暖法中軟中中名頂法中上上軟上中名忍法上上名世間第一法若觀陰無常等善根名暖法觀三寶功德名頂法觀察聖諦名忍法觀苦聖諦次第聖道名世間第一法彼得暖法已若退捨若命終捨若度界地捨亦起無間業斷善根生惡趣中緣此福故要得涅槃頂法退亦如是唯除斷善根忍則不退有命終捨及度界地捨不作無間業不斷善根不墮惡趣以忍大力故如師子王群獸遠避忍力如是一切惡心非數滅亦如大王之所住處人天惡行心皆柔軟問世間第一法何緣幾行答下苦有四行説攝依六地忍法亦如是謂餘或依七下苦有四行者欲界苦説下彼世間第一法所緣無常苦空無我行轉非餘似見道故有二種修行者愛行及見行愛行有二種我慢行及懈怠增見行亦二種我及我所計著我慢者修無常行世間第一法懈怠增者修苦行我行計著者修非我行我所計著者修空行問幾地所攝答謂攝依六地未來中間根本四禪非欲界無定故非無色界無見道故問餘決定分善根幾地攝答忍法亦如是謂忍六地攝如世間第一法謂餘或依七者暖頂亦六地尊者瞿沙欲令欲界亦有問已説決定分次第起聖道次第起復云何答世間第一法次生苦法忍忍次生於智俱觀於下苦世間第一法次生苦法忍者世間第一法次第生苦法忍欲界見苦斷十使對治是則初無漏無礙道復次世間第一法次第不作不向不行捨邪業邪趣邪見邪業者五無間業邪趣者惡趣邪見者五見又世間第一法分苦法忍作五種定謂地定行定緣定剎那定次第緣定地定者若此地世間第一法即此地苦法忍行定者若此行世間第一法即此行苦法忍緣定者必同緣故剎那定者若此剎那背即此剎那生次第緣定者世間第一法次第必生苦法忍增上忍分作三種定除剎那及次第緣以是故緣苦忍後得超升離生彼思惟欲界苦及色無色界苦乃至色無色界行對治是名下忍彼復思惟欲界苦乃至欲界行對治捨色無色界行對治是中忍彼一一諦觀察捨還乃至欲界苦相續修然後復捨相續乃至欲界苦一剎那思惟是增上忍然後生世間第一法忍次生於智者苦法忍次第生苦法智解脫道自性問此忍智何緣答俱觀於下苦下苦是欲界苦彼苦俱觀謂色無色苦集滅道亦然此法無間等説是十六心謂色無色苦者色無色界苦亦如是苦比忍無礙道苦比智解脫道集滅道亦然者集滅道諦亦以二忍為無礙道二智為解脫道此法無間等是説十六心者此十六心頃為法無間等無間等是見義此十五心頃是見道最後一心是修道問何故三諦忍及智見道攝道諦最後心修道攝耶答修十六行道故道比智相應修十六行非見道修十六行道比智相續故果道所攝謂不應者不然如盡智成者此則成若此非分者無學道亦非分略説三地見地修地無學地於此諸地建立人如是義今當説隨法行利根此在十五意隨信行鈍見當知亦在中隨法行利根此在十五意者見道十五心人若利根説隨法行隨法行故説隨法行不從他信故隨信行鈍見當知亦在中者即此十五心人若鈍根者説隨信行信他得度故隨信行者少觀察隨法行者多觀察隨信隨法行若具煩惱縛乃至五種斷當知向始果此隨信隨法行人若具煩惱縛若一二三四五種斷名向須陀洹果煩惱上上等分別故立九品彼若凡夫時未曾斷一品名具縛若斷一品名不具縛若斷五品超升離生欲界見苦斷五品斷苦法智得解脫證乃至見道斷五品斷道法智得解脫證欲界修道斷五品斷斯陀含果得解脫證六斷乃至八是向第二果離欲至八地是則第三向六盡乃至八是向第二果者此隨信行隨法行者若已六七八品斷此説向斯陀含果離欲至八地是則第三向者此隨信行隨法行者若離欲乃至無所有處盡彼俱向阿那含果若至十六心是名住於果軟見信解脫利見名見到若至十六心是名住於果者第十六心名道比智相應彼起俱説住果若須陀洹若斯陀含若阿那含軟見信解脫者若軟見入見道名隨信行彼住三果時名信解脫利見名見到者若利根入見道名隨法行彼住三果時名見到見到信根勝信解脫但以慧所勳故説見到非事諸煩惱謂彼一切盡乃至未進行是名須陀洹若見道斷八十八結盡是須陀洹果乃至未集行是名住須陀洹果若方便斷上上種是名向斯陀含果即此種乃至五品斷超升離生道比智起名須陀洹非向斯陀含以向彼果道未一念現在前故問斷衆多煩惱何故世尊説三結盡耶答十使是根本五見疑愛恚慢無明彼見道斷六五見及疑彼見道斷六使永盡彼三轉三隨轉彼身見是轉邊見是隨轉戒取是轉見取是隨轉疑是轉邪見是隨轉已説轉當知已説隨轉是故世尊説三結盡是須陀洹復次此諸煩惱或一種二種四種已説身見當知已説一種已説戒取當知已説二種已説疑當知已説四種如是一切遍不一切遍有漏緣無漏緣盡當知此結已盡已知乃至阿羅漢猶有相似隨轉故未盡修道種受生生死七當知彼所説極滿須陀洹彼須陀洹修道種未盡彼極滿當知七有七生人間中陰生陰及欲界天此總説七有不過七故如七葉樹問何故説七有不增不減耶答如七步蛇所螫四大力故至七步毒力故不至八如是業力故七生道力故不至八彼住增上忍時除欲界七生餘一切生得非數滅至竟不現在前若人間超升離生人間滿七天上者還天上滿中間聖道雖現在前業力持故不般涅槃問若滿七生佛不出世彼云何得阿羅漢果答有説在家得阿羅漢果得果已不住家又説即彼形自出家成就不壞淨故希望具足故見惡行過故是故須陀洹法不墮惡趣又佛種性中生故智火明淨故見境界過故止觀具足故聖道藥所勳故如王大子如內火增人如巧便魚是故須陀洹不墮惡趣凡夫雖不墮惡趣以少及不定故不説住正定聚故説定必得涅槃故説趣正覺七有者如前説住者中陰生者生陰故説住生更不受餘生故名住苦邊不必一切須陀洹滿七有也若斷三四種成就彼對治餘二生三生是説名家家三因緣故建立家家謂煩惱斷成就根及受生煩惱斷者欲界修道斷煩惱三品四品斷無有五品斷名家家若能斷五品者勢力故必斷六品成斯陀含非第六品力能障令不至果成就根者得彼對治無漏諸根受生者或更受欲界餘二生三生若三因緣一一不具非家家有二種家家若天若人天家家者謂欲界天或受二生三生或受一天處種類身或二或三人家家者謂人間身或一天下或二或三或一家或二或三問家家有何義答從家至家而般涅槃故曰家家須陀洹勝者名家家六品煩惱斷見道斷一切是説斯陀含謂彼未進行若欲界修道斷上三品中三品及見道斷一切盡住果未進行名斯陀含問斯陀含有何義答於此命終生欲界天一來人間而般涅槃若七八品斷成就對治根餘則受一生是名一種子若欲界修道斷七品八品及見道斷一切盡得彼對治無漏根欲界餘一生名一種子三因緣一一不具非一種子若天一種子受天一身而般涅槃人間亦爾餘一生種子故説一種子問何故八品斷名一種子五品斷不名家家耶答正使六品斷為家家者猶生欲界是故欲界業煩惱不為障礙一種子九品盡生色界是故欲界業煩惱極作障礙以是故説三處衆生業極作惱亂三處後當説一種子者是上斯陀含九品盡不還當知有多種或五及七八或復説衆多九品盡不還者見道斷一切及欲界修道斷九品結盡當知阿那含問有爾所煩惱斷何故世尊説五下分結盡為阿那含耶答一二四五種如是一切五下分悉攝故可惡卑下同義復次二種下界下及衆生下界下者欲界衆生下者凡夫貪恚繫故下界者難度故身見戒取疑繫故衆生下如守門防邏故聖人或先斷二結或三結集斷故説五不還欲界名阿那含此亦多種或五及七八或復説衆多是説阿那含五種者謂中般涅槃生般涅槃行般涅槃無行般涅槃上流般涅槃七者中般涅槃有三種如契經説中般涅槃三種者一如小迸木火二如小小迸熱鐵三如迸燒鐵丸此即契經説四如前説八者五種如前説又現法般涅槃無色界阿那含及不定人色界五種根建立則十五中般涅槃上中下根乃至上流亦如是地建立則二十初禪有五乃至第四禪亦五種性建立則三十中般涅槃有六種謂退法種性思法護法住法升進法不動法種性如是乃至上流亦如是處所建立則八十梵身天五如是乃至阿迦膩吒天種性根建立則九十地種性建立則百二十地種性根建立則三百六十種性處建立則四百八十種性處根建立則一千四百四十記曰十五有二十三十與八十九十百二十及三百六十四百八十種千四百四十如是廣略説攝受阿那含根地及種性處所廣建立隨彼煩惱斷今當次第説復次一阿那含謂中般涅槃根建立三地四種性六處所十六種性根十八地種性二十四地離欲三十六地種性根七十二處種性九十六地種性離欲二百一十六處種性根二百八十八地種性根離欲六百四十八處種性離欲八百六十四處種性根離欲建立二千五百九十二當知是中般涅槃數乃至上流亦如是此一切攝受萬二千九百六十記曰一三四與六十六及十八謂説二十四復説三十六七十有二種九十有六種二百一十六二百八十八六百四十八八百六十四又復説二千五百九十二如是阿那含其數有五倍即上二千五百九十二五倍為一萬二千九百六十已説一切阿那含五阿那含相今當説利根軟煩惱住於一種業是中般涅槃分別六種性利根軟煩惱住於一種業是中般涅槃者此人利根及軟煩惱作中陰業增長不作生陰業彼於欲界沒住色界中陰得無漏道以此道捨餘結而般涅槃是名中般涅槃度欲界難故非欲界中陰般涅槃若欲令般涅槃者彼應斷不善無記二種結得若二若三沙門果越度三界而欲界中陰於此無能若色界沒者上流品所攝問此人幾種性答分別六種性中般涅槃當知六種性退法乃至不動若説利根不應退種性者不然彼亦建立九品根故精進勤方便修習速進道是生般涅槃彼亦有二説精進勤方便修習速進道是生般涅槃者生般涅槃人作中陰生陰業命終受色界天中陰及生陰彼初生起有行道謂勤方便及速進道疾斷餘結初生便般涅槃故説生般涅槃彼亦有二説者有説若初生斷煩惱般涅槃者不然無捨壽行分故無有捨壽行者乃至盡壽住此義為勝第三勤方便離於速進道第四不勤求三俱説六種第三勤方便離於速進道者彼行般涅槃若差別者不行速進道餘如前説名者起有行道斷餘煩惱而般涅槃是行般涅槃復次依有為緣三昧斷煩惱而般涅槃亦是行般涅槃第四不勤求者此無行般涅槃亦不勤求亦不行速進道餘如前説名者起無行道斷餘煩惱而般涅槃是無行般涅槃復次依無為緣三昧斷煩惱而般涅槃亦是無行般涅槃三俱説六種者行與無行及生般涅槃當知俱説六種性此三種雖皆是生般涅槃義差別故説三無過超半超處處是名為上流此亦六種性當知進不進超半超處處是名為上流者上流有二種或先得勳禪或不得彼先得者先勳修三禪而後退住初禪初禪味相應命終生梵天中彼亦三種超半超及一切處沒彼超者生初禪乃至離第三禪欲勳修滿超第四禪彼命終生阿迦膩吒天半超者從梵天沒或生一二三處然後生阿迦膩吒天一切處沒者生一一處乃至阿迦膩吒天先不得勳者不生淨居天生無色界餘如前説問此幾種性答此亦六種性上流亦六種性退法乃至不動此非初住不動種性根謂退法種性於勳修禪退後得見到當知進不進者上流者當知有進不進應作四句當進修非不進者謂住欲界梵天不進非當進者謂住阿迦膩吒天亦進亦不進者謂住餘天非進非不進者無也若向無色界者非勳修是故説生無色界問世尊説七士夫趣彼云何建立七士夫趣答謂生根煩惱是説有三種不生亦復然及二上流一一阿那含四因緣故七種建立所謂根建立煩惱建立生不生建立及上進建立彼生者初利根軟煩惱第二中根中煩惱第三軟根上煩惱如生三不生亦三上流者説上進凡夫轉還故非上流無色界上流有五事勝謂界勝地勝正受勝陰減煩惱斷雖有五事勝不得勳修故不建立士夫趣如是九煩惱在於上八地謂彼雙道滅世尊之所説如是九煩惱在於上八地者如欲界修道斷煩惱有九品從軟軟至上上上八地亦如是謂四禪四無色彼初見道起以一種道斷九種煩惱問若色無色界煩惱亦九種彼何故不建立離欲人耶答一處中二生非分故欲界有如是天如是方如是家聖人二生非色無色界聖人二生若二生者無生般涅槃乃至上流謂彼雙道滅世尊之所説者此三界煩惱當知無礙解脫道滅無礙道能斷煩惱得解脫道得解脫證無礙道斷煩惱解脫道不失所作故説雙道滅若言解脫道斷煩惱者云何為起耶未起耶若起者彼初盡智生時應有煩惱此則非究竟若未起者不應未來道斷煩惱耶問為何道斷煩惱耶答有垢無垢道俱能離八地住彼説身證謂得滅正受有垢無垢道俱能離八地者有垢者世俗道無垢者聖道除第一有餘地離欲時當知有漏無漏道離第一有唯無漏有漏於彼非分故世俗道攀上地故離下地煩惱如折樓蟲非想非非想處無有上地可攀能離彼結自地繫縛故不能離自地結如人被縛不能自解彼世俗無礙道三行若麁若苦若麁障彼現故説麁三苦成故説苦易觀故説麁障解脫道亦三行謂止妙出一一行無礙道下緣解脫道上緣聖行後當説住彼説身證謂得滅正受者住八地見道修道斷一地見道斷中住得滅正受説名身證是故學人於第一有一一離欲中起滅正受彼或具結所縛得滅正受或八品盡得世尊以度諸正受故説言度一切非想非非想想知滅身作證具足住法以涅槃與身合故説身證滅正受定品當廣説金剛喻定次必生於盡智生意我生盡應供離諸漏金剛喻定次必生於盡智者非想非非想地離欲第九無礙道名金剛三摩提無一不壞故名金剛此義擇品當廣説金剛定次第必生盡智此初二智或苦比智或集比智謂彼盡智起已起自己行生意我生盡彼非想非非想處四陰緣有根本故應供離諸漏者彼盡智生一切有漏盡名為應供應一切供養故害一切煩惱故更不於有田種識種子故不動阿羅漢盡智次第無生智起彼盡智一剎那無生智或一剎那若次第等見現在前一剎那若無生智現在前則相續時意解脫盡智或一剎那若次第等見現在前一剎那若復盡智現在前則相續問阿羅漢幾種答阿羅漢六種隨信行生五彼得於二智當知時解脫阿羅漢六種者謂退法思法護法住法必升進法不動法若初學地不常方便不頓方便是名退法思法亦如是堪能思願護法者常方便不頓方便以隨護故不退住法者頓方便不常方便不退亦不進必升進者常方便頓方便是鈍根能得不動不動法者常頓方便是利根有説若退法者必退乃至得必升進必升進者必升進彼説六種是欲界阿羅漢色無色界有二種住法及不動法有説退法不必退若退者唯此種性非餘彼説三界悉有六種阿羅漢隨信行生五者此六種阿羅漢中前五種是信種性彼成就二智謂盡智及無學等見彼或時退故不説無生智世尊以更不受生故一切契經説更不受後有知如真當知時解脫者當知此是時解脫衣食床臥具處所説法及人隨順故善根增進不能一切時隨所欲進故説時解脫不動法利根是不時解脫彼得於三智自解脫成就不動法利根是不時解脫者若不動法一向利根能一切時隨所欲進修善業不待衆具是不時解脫彼得於三智者彼成就三智盡智無生智及無學等見是不退法自解脫成就者當知彼自已相似名解脫成就時意解脫者待時故時意解脫成就不動法者不動故不為煩惱所動故説不動是不退義問何故時意解脫名為愛非不動耶答彼極自護故猶如一目不自在故畏退故如借他物彼相繫善根非分故不動解脫有相繫善根謂彼有餘三摩提故是故不名愛謂空空無願無願無作無作以定捨定名相繫慧解脫當知不得滅盡定若得滅盡定當知俱解脫慧解脫當知不得滅盡定者此六種阿羅漢不得滅盡定者説慧解脫以慧力解脫煩惱障故名慧解脫若得滅盡定當知俱解脫者此六種阿羅漢得滅盡定者説俱解脫彼慧力離煩惱障心得解脫滅正受力離解脫障得解脫是故名俱解脫若復退法一切俱解脫作四句退法非俱解脫者謂退法不得滅盡定俱解脫非退法者謂五種羅漢得滅盡定亦退法亦俱解脫者謂退法得滅盡定亦非退法亦非俱解脫者謂五種羅漢不得滅盡定乃至不動解脫亦如是諸根説九種亦説九種人七種諸聲聞緣覺及如來此説九種根謂軟軟乃至上上阿羅漢人亦九種謂前五種及二不動解脫或因時解脫得不動或始得不動此七種聲聞及緣覺如來是名九種人已説根建立人若人成就根今當説軟中最軟根是為初種人乃至增上上第九人當知彼退法成就軟軟根思法軟中護法軟上住法中軟升進中中因時解脫種性不動法中上初不動解脫上軟緣覺上中如來上上謂以學種性得彼無學果或即彼種性或進不退轉六種阿羅漢或以學地如是種性得阿羅漢即彼種性羅漢或增益根得不退轉彼種性修習根故彼退法有三事後當説不動法唯一事即住彼般涅槃餘阿羅漢有二事已説根本種性阿羅漢增進根今當説所謂三四五六七次第增是諸退法等説五羅漢等彼退法有三事謂退住學法退法根若住彼般涅槃若上增進根思法有四事謂退住學根退即住退法根若異者應進不退前説彼種性不退故住退法根即住彼般涅槃上增進根護法有五事謂護法退住學根住退法根住思法根即住彼般涅槃上增進根住法六種必升進七隨其義説已説建立賢聖人相建立法今當説謂隨信行法若隨法行法及與見諦道是盡同一相隨信行法隨法行法及見諦道此三種法盡同一相差別者隨信行者鈍根隨法行者利根於中諸根法是名未知根謂餘有學法佛説已知根於中諸根法是名未知根者彼見諦所攝根數有九法謂意根樂根喜根捨根信等五根是名未知根此諸根隨信行隨法行所成就名者未知當知故説未知根問苦法忍生觀欲界五陰後苦法智生非於五陰已知當知耶若言未知當知此則不然答忍非智非智性故無過忍是見非智性故以智知故非不然謂餘有學法佛説已知根者除見道學法餘學法即此根數九法説已知根此根信解脫見到身證所成就雖道比智生觀道比忍是未知當知以少故不説如大海一渧須彌一塵虛空蚊處當知無學法是説無知根得果捨前道無礙智所説當知無學法是説無知根者當知無學法即此根數九法説無知根此根慧解脫俱解脫所成就彼見道六地四禪未來中間非上地方便善根非分及非廣境界故修道學法九地此六地及三無色五陰性得果捨前道無礙智所説者得果時當知捨前無漏道得須陀洹果捨見道得斯陀含果若先倍欲盡亦捨見道若次第者捨須陀洹果及須陀洹進向道得阿那含果若先欲愛盡亦捨見道若次第者捨斯陀含果及斯陀含進向道得阿羅漢果捨阿那含果及阿那含進向道問世尊説隨信行等七人云何建立耶答方便及諸根正受解脫俱當知賢聖七事則説有六方便及諸根正受解脫俱當知賢聖七者五因緣故説七人名七非事七五因緣者謂方便根正受解脫正受解脫方便者隨信行隨法行隨信行者信多故説隨信行先種諸業信他故作後得道已以本名説隨法行者先自思惟興造諸業後得道已以本名説根者信解脫見到鈍根説信解脫利根説見到正受者是身證解脫者是慧解脫正受解脫者是俱解脫事則説有六者此諸聖人有六見道有二謂隨信行隨法行修道有二謂信解脫見到無學道有二謂時解脫不時解脫隨信行人應説一謂七人根故應説三謂軟中上種性故應説五謂退法乃至必升進道故應説十五住苦法忍乃至道比忍離欲者應説七十三欲界離欲十謂具縛乃至九品盡初禪九乃至無所有處復次根種性道依建立增亦應廣説如是隨信行人有十四萬七千八百二十五彼所攝受一三五十五及與七十三謂根種性道離煩惱當知三倍次五倍十五及九倍如是衆多種唯説隨信行當知餘聖人隨其義亦應如是説問如契經説向須陀洹等八人此云何答以有五事故説有八人名先後事各一中間則有三此四向四果説八人名事有五向須陀洹及阿羅漢此名一事亦一須陀洹及向斯陀含此名二事一斯陀含及向阿那含阿那含及向阿羅漢亦如是彼前四人成就一地聖道即此亦説家家及一種向阿那含果或一地乃至六地阿那含果或三地乃至六地向阿羅漢或三地乃至九地阿羅漢成就九地彼沙門果道壞地壞應作四句道壞非地壞者斯陀含果地壞非道壞者阿羅漢果道壞地壞者阿那含果道不壞地不壞者須陀洹果雜有漏無漏名道壞雜依諸禪名地壞已盡為解脫得依於一果不穢污第九滅盡應當説已盡為解脫得依於一果者向道中諸解脫道得解脫得果時法智品所斷盡得一解脫得比智品所斷盡得二解脫得道不壞故故説一得果時説五因緣得未曾道捨曾道頓得八智一時修十六行得一味解脫果問穢污斷前已説不穢污云何斷答不穢污第九滅盡應當説前已説煩惱眷屬九品斷不穢污者住第九無礙頓斷非漸漸不穢污者世俗善及不隱沒無記五陰穢污色亦第九無礙斷以少故不説問何故煩惱九品斷不穢污第九無礙斷耶答煩惱聖道相違故聖道與煩惱相違不穢污不相違是故彼如是如是道起隨所應斷煩惱斷軟軟道起上上煩惱斷乃至上上道起軟軟煩惱斷如小明滅麁暗大明滅微暗彼亦如是以穢污者自性斷不成就不穢污者捨煩惱過如雜毒無著相似名彼能獲不動信解脫種性升進亦增道無著相似名彼能獲不動者非彼一切阿羅漢能得不動唯功德名相似者得謂必升進於彼五種中增進根者得謂退法進至思法如是次第盡當知又得不動有九無礙及九解脫道如得阿羅漢也九無礙道八解脫道時解脫攝第九解脫道不時解脫攝彼一切果道所攝彼方便道若無漏者果道所攝有漏者不攝信解脫種性升進亦增道者彼信解脫若必升進種性能得見到非餘性是故學地五種亦增進根增進道者謂熾然根增進根者人中增非餘趣聖道增非世俗道學者依禪無學者依禪及無色須陀洹斯陀含依未來增進根即彼捨一地得一地阿那含若先依初禪及眷屬超升離生及次第未得第二禪彼增進根者捨三地果得三地果若得第二禪非第三禪後依初禪增進根者彼捨三地果及四地勝果道即得三地果如是乃至得無漏無所有處捨三地果及捨九地勝果道得三地果若謂捨多道得少道應退者不然何以故得勝道故彼人意解故問捨道亦捨斷耶答世俗道斷者不捨若非想非非想處煩惱一一種斷得見到時彼非想非非想修道斷捨斷及對治而不成就煩惱得如凡夫生上地時又復若先依初禪超升離生後依第二禪增進根者彼捨三地果及四地勝果道得四地果如是一切地應廣説若住果而增進根者彼方便無礙及解脫道果所攝若住勝果道增進根者若彼方便無礙道勝果道所攝若解脫道果所攝一方便道一無礙道亦一解脫道如是見道亦六種性而無增進根以速道故如是決定分善根亦六種性修行者次第增進根唯世間第一法無增進根以一念故已説諸根滿謂學滿非滿今當説或有學果滿或根或正受或復三俱滿無學二亦然彼學有三事滿或果滿或根滿或正受滿若信解脫阿那含不得滅盡定者唯果滿非根滿軟根故非正受滿不得滅盡定故見到須陀洹斯陀含唯根滿非果滿非正受滿信解脫阿那含得滅盡定果滿及正受滿非根滿見到阿那含不得滅盡定者果滿及根滿非正受滿見到得滅盡定者三事滿無學二亦然者一切無學果滿無二果性故慧解脫軟根者果滿非根滿利根者果滿及根滿俱非正受滿俱解脫軟根者果滿及正受滿非根滿利根者三事滿問三種滿謂善觀諦云何觀諦為頓耶為漸漸耶答建立功德惡漸漸見真諦無礙道力得有為無為果建立功德惡漸漸見真諦者於此真諦見過惡故立苦集諦見功德故立滅道諦是故非見過惡時見功德亦非見功德時見過惡體異故亦非不如實見諦名諦無間等亦非一智總觀諦諦衆多性故是故漸漸見真諦有説無我行頓無間等彼如是説無我行緣一切法應頓無間等者不然何以故顛倒衆多故自性相應共有法非境界故諦異相故無我等於此諦衆多門顛倒非一無我起斷衆多自性惑是故非一無間等漸漸無間等擇品當廣説問諦無間等得沙門果云何為有為果耶無為果耶答無礙道力得有為無為果煩惱數滅及解脫道俱無礙道力得是故俱説沙門果煩惱滅是解脫果及功用果解脫道是功用果及依果問此無間等有幾種答謂三無間等緣事見無間當知有三種或二亦復一三種無間等謂緣無間等事無間等見無間等彼慧三種無間等緣無間等者有緣故事無間等者能成事故見無間等者見性故慧相應法二種無間等緣無間等及事無間等彼共有法唯一事無間等彼苦忍苦智於苦諦三種無間等於滅諦道諦事無間等當知集忍集智於集諦亦如是滅忍滅智於滅諦三無間等於苦集道諦事無間等道忍道智於道諦三無間等於苦集滅諦事無間等修道隨其義當知如是見諦無間等以是因緣當知漸次無間等
